<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>惩罚转盘</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@400;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      background: #08080f;
      background-image:
        radial-gradient(ellipse at 50% 5%, rgba(80, 20, 180, 0.2) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 85%, rgba(0, 150, 255, 0.08) 0%, transparent 50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Noto Sans SC', 'Orbitron', sans-serif;
      padding: 24px 16px 40px;
      gap: 20px;
      position: relative;
    }

    /* Scanlines overlay */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.06) 2px,
        rgba(0, 0, 0, 0.06) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Title ── */
    .title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(18px, 4vw, 36px);
      font-weight: 900;
      text-align: center;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #00d8ff;
      text-shadow:
        0 0 8px #00d8ff, 0 0 20px #00d8ff,
        0 0 40px rgba(0, 200, 255, 0.45),
        0 0 80px rgba(0, 200, 255, 0.25);
      animation: titleBreath 3s ease-in-out infinite alternate;
      margin-top: 12px;
      flex-shrink: 0;
    }
    @keyframes titleBreath {
      from { text-shadow: 0 0 8px #00d8ff, 0 0 20px #00d8ff, 0 0 40px rgba(0,200,255,0.45); }
      to   { text-shadow: 0 0 14px #cc44ff, 0 0 32px #cc44ff, 0 0 65px rgba(180,0,255,0.55); }
    }

    /* ── Wheel Section (pointer + wheel + button all in one container) ── */
    .wheel-section {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin: 10px 0;
    }

    .wheel-wrap {
      position: relative;
      width: min(380px, 88vw);
      height: min(380px, 88vw);
    }

    /* Glowing rings */
    .ring {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .ring-1 {
      width: 104%; height: 104%;
      border: 2px solid rgba(0, 200, 255, 0.25);
      box-shadow: 0 0 22px rgba(0, 200, 255, 0.15), inset 0 0 22px rgba(0, 200, 255, 0.08);
      animation: ringPulse 3.5s ease-in-out infinite;
    }
    .ring-2 {
      width: 110%; height: 110%;
      border: 1px solid rgba(180, 0, 255, 0.18);
      box-shadow: 0 0 16px rgba(180, 0, 255, 0.1);
      animation: ringPulse 3.5s ease-in-out infinite 1s;
    }
    @keyframes ringPulse {
      0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
      50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.012); }
    }

    canvas {
      border-radius: 50%;
      display: block;
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 16px rgba(0, 200, 255, 0.35));
      transition: filter 0.3s;
    }
    canvas.spinning {
      filter: drop-shadow(0 0 30px rgba(0, 200, 255, 0.6));
    }

    /* ── Pointer: INSIDE wheel-wrap, at the TOP ── */
    .pointer {
      position: absolute;
      top: -6px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 15;
      width: 38px;
      height: auto;
      filter: drop-shadow(0 0 8px #00d8ff);
      pointer-events: none;
    }

    /* ── Center GO Button ── */
    .center-btn {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 78px; height: 78px;
      border-radius: 50%;
      background: radial-gradient(circle at 33% 30%, #1a0a35, #060012);
      border: 3px solid #00d8ff;
      box-shadow:
        0 0 16px #00d8ff, 0 0 36px rgba(0, 210, 255, 0.42),
        0 0 64px rgba(0, 210, 255, 0.18), inset 0 0 14px rgba(0, 210, 255, 0.1);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      z-index: 25;
      font-family: 'Orbitron', sans-serif;
      font-size: 19px; font-weight: 900;
      color: #00d8ff;
      letter-spacing: 2px;
      text-shadow: 0 0 8px #00d8ff;
      transition: all 0.18s;
      user-select: none;
    }
    .center-btn:hover:not(:disabled) {
      box-shadow:
        0 0 26px #00d8ff, 0 0 56px rgba(0, 210, 255, 0.68),
        0 0 90px rgba(0, 210, 255, 0.28), inset 0 0 22px rgba(0, 210, 255, 0.16);
      transform: translate(-50%, -50%) scale(1.06);
      color: #fff;
    }
    .center-btn:active:not(:disabled) {
      transform: translate(-50%, -50%) scale(0.93);
    }
    .center-btn:disabled {
      cursor: not-allowed;
      border-color: #334;
      color: #445;
      text-shadow: none;
      box-shadow: none;
    }
    .center-btn.spinning {
      animation: btnSpin 0.4s ease-in-out infinite alternate;
    }
    @keyframes btnSpin {
      from { border-color: #00d8ff; box-shadow: 0 0 16px #00d8ff, 0 0 36px rgba(0,210,255,0.42); }
      to   { border-color: #cc44ff; box-shadow: 0 0 26px #cc44ff, 0 0 56px rgba(200,0,255,0.52); }
    }

    /* ── Result Box ── */
    .result-box {
      width: min(480px, 94vw);
      min-height: 82px;
      border-radius: 14px;
      background: rgba(8, 4, 24, 0.88);
      border: 2px solid rgba(0, 200, 255, 0.25);
      box-shadow:
        0 0 18px rgba(0, 200, 255, 0.1),
        inset 0 0 28px rgba(0, 0, 0, 0.6);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 16px 20px;
      gap: 3px;
      text-align: center;
      position: relative;
      overflow: visible;
      transition: border-color 0.3s, box-shadow 0.3s;
      flex-shrink: 0;
    }
    .result-box::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: 14px;
      background: linear-gradient(135deg, transparent 40%, rgba(0,200,255,0.03) 58%, transparent 75%);
      pointer-events: none;
    }


    .result-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 9px; font-weight: 700;
      letter-spacing: 4px; text-transform: uppercase;
      color: rgba(0, 200, 255, 0.48);
      position: relative; z-index: 1;
    }

    .result-number {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(26px, 7vw, 44px);
      font-weight: 900; color: #00d8ff;
      text-shadow: 0 0 10px #00d8ff, 0 0 24px rgba(0,210,255,0.55), 0 0 48px rgba(0,210,255,0.28);
      position: relative; z-index: 1; line-height: 1.1;
    }

    .result-text {
      font-size: clamp(12px, 3.2vw, 16px);
      font-weight: 700; color: #fff;
      line-height: 1.52; position: relative; z-index: 1;
      max-width: 100%;
      word-break: break-word;
    }
    .result-box.idle .result-text { color: rgba(255,255,255,0.2); font-weight: 400; }

    /* ── Footer ── */
    .footer {
      font-size: 9px; color: rgba(0, 200, 255, 0.16);
      letter-spacing: 3px; font-family: 'Orbitron', sans-serif;
      flex-shrink: 0;
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <!-- ═══ Title ═══ -->
  <div class="title">⚔️ 惩罚转盘 ⚔️</div>

  <!-- ═══ Wheel + Pointer + GO Button (all in one positioned container) ═══ -->
  <div class="wheel-section">
    <div class="wheel-wrap">

      <!-- Rings behind canvas -->
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>

      <!-- Pointer arrow (positioned at top of wheel-wrap) -->
      <div class="pointer">
        <svg viewBox="0 0 44 54" xmlns="http://www.w3.org/2000/svg" fill="none" preserveAspectRatio="xMidYMid meet">
          <defs>
            <linearGradient id="pg" x1="22" y1="0" x2="22" y2="54" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#cc44ff"/>
              <stop offset="100%" stop-color="#00d8ff"/>
            </linearGradient>
            <filter id="pglow">
              <feGaussianBlur stdDeviation="2.5" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <!-- Glow -->
          <path d="M22 50 L8 13 Q8 1 22 1 Q36 1 36 13 Z" fill="#cc44ff" fill-opacity="0.22" filter="url(#pglow)"/>
          <!-- Body -->
          <path d="M22 50 L8 13 Q8 1 22 1 Q36 1 36 13 Z" fill="url(#pg)" filter="url(#pglow)"/>
          <!-- Inner line -->
          <path d="M22 43 L11 14 Q11 5 22 5 Q33 5 33 14 Z" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1.2"/>
          <!-- Tip dot -->
          <circle cx="22" cy="3.5" r="2.2" fill="#fff" fill-opacity="0.75"/>
        </svg>
      </div>

      <!-- Canvas wheel -->
      <canvas id="wheel" width="800" height="800"></canvas>

      <!-- Center GO button -->
      <button class="center-btn" id="goBtn" onclick="startSpin()">GO</button>

    </div><!-- /.wheel-wrap -->
  </div><!-- /.wheel-section -->

  <!-- ═══ Result Box ═══ -->
  <div class="result-box idle" id="resultBox">
    <div class="result-label">PUNISHMENT</div>
    <div class="result-number" id="resultNum">—</div>
    <div class="result-text" id="resultText">点击中间的 GO 开始</div>
  </div>

  <!-- ═══ Footer ═══ -->
  <div class="footer">PUNISHMENT WHEEL · 55</div>


<script>
/* ─── Punishments Data ─── */
const PUNISHMENTS = [
  "全程开镜（半场）没钱买用手枪",
  "禁用准星（半场）",
  "见敌人自转一圈在开枪（半场）",
  "半场静步",
  "左键绑定丢枪（半场）",
  "不能用技能（半场）",
  "只能按S走路（半场）",
  "只能蹲着走（半场）",
  "灵敏度+1.0（半场）",
  "退弹至5颗（半场）",
  "不能打背身",
  "只能跑打（半场）",
  "只能用刀+标配（半场）",
  "只能用飞将（半场）",
  "队长指定下回合杀谁，杀不死下回合不可以起长枪",
  "英语交流（半场）",
  "使用技能房间麦喊出技能名字（半场）",
  "指定准星（半场）",
  "不可以说你我他 说了挂机一回合",
  "游戏音效调到0（半场）",
  "杀一个人喊出对面游戏名字亲一口",
  "只能鬼魅（半场）",
  "只能AD走路（半场）",
  "空格绑定开火（半场）",
  "只能玩喷子（半场）（不能玩霓虹和炸弹妹）",
  "主人契约：选定一人为你的主人，主人说啥就是啥有啥受着（不能涉及H）",
  "灵敏度2.0（半场）",
  "WS换成AD（半场）",
  "灵敏度调低一半（半场）",
  "爆照",
  "真心话大冒险",
  "只能玩大狙（半场）",
  "只能玩钱包（只能用技能的枪），可以给队友发",
  "第二人格：每小局敌方可让其背刺指定队友一次（挡路/挡子弹/报点/杀队友等）",
  "只能去A拆包",
  "爱情丘比特：绑定对面一人共生死，对方死了自己立即自杀（半场）",
  "M的养成：每被造成伤害就要说好爽",
  "酒店服务生：防守方时对面打进点立刻停火并说「欢迎光临」",
  "爱神附体：对在场随机两个人深情告白（每人不低于一分钟且不能水）",
  "用撒娇的语气说话一整局",
  "走到包点内才能切枪",
  "回合结束丢掉所有枪",
  "只能用机枪",
  "队友杀掉一人才能走路",
  "只能捡队友/对手死亡后掉的枪，自己的钱不能给队友发枪",
  "下包前不能打人",
  "进攻方时杀掉2个敌人或自己死之前队友不能动（队友可以开枪）",
  "只能使用奇怪准星（例如最大准星）",
  "老奴人格：双方所有人可以随时使唤，例如发枪报点等（必须服从每人一次）",
  "宝宝契约：指定一名异性",
  "只能去B拆包",
  "对方击杀你一次夸奖对方：主人好枪",
  "AD键互调（十个人头）",
  "鼠标开火键与开镜键互调（十个人头）",
  "死了就要房间麦全程唱歌直到回合结束（半场）"
];

/* ─── Canvas Setup & Drawing ─── */
const canvas = document.getElementById('wheel');
const ctx    = canvas.getContext('2d');
const W = 800, H = 800, CX = W / 2, CY = H / 2, R = 380;
const NUM     = 55;
const SWEEP   = (2 * Math.PI) / NUM;
const TXT_R   = 290;

// Neon palette (55 colors)
const PALETTE = [
  '#00d8ff','#cc44ff','#7b2fff','#00d8ff',
  '#e040fb','#00d8ff','#651fff','#cc44ff',
  '#00b8d4','#9c27b0','#00d8ff','#e040fb',
  '#7c4dff','#00acc1','#d500f9','#0097a7',
  '#ff4081','#00d8ff','#aa00ff','#00d8ff',
  '#536dfe','#cc44ff','#18ffff','#d500f9',
  '#00d8ff','#ff6d00','#651fff','#00d8ff',
  '#e040fb','#0091ea','#00d8ff','#7b1fa2',
  '#00d8ff','#ff1744','#cc44ff','#00d8ff',
  '#651fff','#0097a7','#00d8ff','#e040fb',
  '#00b8d4','#7c4dff','#00d8ff','#d500f9',
  '#1e88e5','#cc44ff','#00d8ff','#aa00ff',
  '#00d8ff','#536dfe','#e040fb','#00acc1',
  '#7b2fff','#00d8ff','#ff6d00'
];

function drawWheel(rotation) {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(CX, CY);
  ctx.rotate(rotation);

  for (let i = 0; i < NUM; i++) {
    const start = i * SWEEP;
    const end   = start + SWEEP;
    const mid   = start + SWEEP / 2;
    const c     = PALETTE[i % PALETTE.length];

    // Segment fill
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, R, start, end);
    ctx.closePath();
    ctx.fillStyle = c + 'cc';
    ctx.fill();

    // Segment stroke
    ctx.strokeStyle = c;
    ctx.lineWidth   = 1.5;
    ctx.globalAlpha = 0.5;
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Divider line
    const dx = R * Math.cos(start);
    const dy = R * Math.sin(start);
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(dx, dy);
    ctx.strokeStyle = 'rgba(255,255,255,0.14)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Number
    const tx = TXT_R * Math.cos(mid);
    const ty = TXT_R * Math.sin(mid);
    ctx.save();
    ctx.translate(tx, ty);
    ctx.rotate(mid + Math.PI / 2);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = 'bold 15px Orbitron, monospace';
    ctx.fillStyle = '#ffffff';
    ctx.shadowColor = c; ctx.shadowBlur = 8;
    ctx.fillText(i + 1, 0, 0);
    ctx.restore();
  }

  // Outer glow ring
  ctx.beginPath(); ctx.arc(0, 0, R, 0, 2*Math.PI);
  ctx.strokeStyle = 'rgba(0,216,255,0.35)';
  ctx.lineWidth = 3;
  ctx.shadowColor = '#00d8ff'; ctx.shadowBlur = 15;
  ctx.stroke(); ctx.shadowBlur = 0;

  // Inner hub circle
  ctx.beginPath(); ctx.arc(0, 0, 68, 0, 2*Math.PI);
  ctx.fillStyle = '#08080f';
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,216,255,0.3)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Hub decoration dots
  for (let a = 0; a < 8; a++) {
    const ang = (a / 8) * Math.PI * 2;
    ctx.beginPath();
    ctx.arc(42 * Math.cos(ang), 42 * Math.sin(ang), 2.5, 0, 2*Math.PI);
    ctx.fillStyle = 'rgba(0,216,255,0.3)';
    ctx.fill();
  }

  ctx.restore();
}

/* ─── Spin Logic ─── */
let curRot   = 0;
let spinning = false;

function startSpin() {
  if (spinning) return;
  spinning = true;

  const cvs   = canvas;
  const btn   = document.getElementById('goBtn');
  const box   = document.getElementById('resultBox');
  const numEl = document.getElementById('resultNum');
  const txtEl = document.getElementById('resultText');

  btn.disabled = true;
  btn.textContent = '...';
  btn.classList.add('spinning');
  cvs.classList.add('spinning');

  box.classList.remove('reveal');
  box.classList.remove('idle');
  numEl.textContent = '—';
  txtEl.textContent = '正在转动...';
  box.classList.remove('idle');

  // Pick random target
  const target    = Math.floor(Math.random() * NUM);
  const targetMid = -Math.PI / 2 + (target + 0.5) * SWEEP;
  const norm      = ((curRot % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
  const spins     = 6 + Math.random() * 3;
  const extra     = -targetMid - norm;
  const total     = spins * 2 * Math.PI + extra;
  const finalRot  = curRot + total;

  const duration  = 5000 + Math.random() * 1000;
  const t0        = performance.now();

  function ease(t) { return 1 - Math.pow(1 - t, 3); }

  function step(now) {
    const elapsed = now - t0;
    const p      = Math.min(elapsed / duration, 1);
    const e      = ease(p);
    curRot = curRot + (finalRot - curRot) * e;
    drawWheel(curRot);
    if (p < 1) {
      requestAnimationFrame(step);
    } else {
      curRot = ((curRot % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
      spinning = false;
      btn.disabled = false;
      btn.textContent = 'GO';
      btn.classList.remove('spinning');
      cvs.classList.remove('spinning');
      showResult(target);
    }
  }
  requestAnimationFrame(step);
}

function showResult(idx) {
  const box   = document.getElementById('resultBox');
  const numEl = document.getElementById('resultNum');
  const txtEl = document.getElementById('resultText');

  box.classList.remove('idle');
  numEl.textContent = idx + 1;
  txtEl.textContent = PUNISHMENTS[idx];
}

/* ─── Init ─── */
drawWheel(0);
</script>
</body>
</html>
